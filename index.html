<!DOCTYPE html>
<html lang="zh-CN">
<head>

    * { box-sizing: border-box; }

    .hero, .section, .footer-note, .summary-card, .case-block {

    }
    .hero { padding: 24px; margin-bottom: 18px; }
    .hero h1 { margin: 0 0 8px; font-size: 30px; }
    .hero p { margin: 0; line-height: 1.7; color: #4b5563; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
    .summary-card { padding: 16px; }
    .summary-label { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
    .summary-value { font-size: 24px; font-weight: 800; }
    .section { padding: 20px; margin-bottom: 18px; }
    .section h2 { margin: 0 0 14px; font-size: 22px; }
    .prompt-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .prompt-card { border: 1px solid #e5e7eb; border-radius: 18px; padding: 16px; background: #fbfdff; }
    .prompt-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .prompt-name { font-size: 17px; font-weight: 800; }
    .badge { display: inline-flex; align-items: center; justify-content: center; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; background: #e8f0ff; color: #2456c8; white-space: nowrap; }
    .prompt-meta { font-size: 13px; color: #6b7280; line-height: 1.7; margin-bottom: 10px; }
    .prompt-text { background: #0f172a; color: #e5eefb; border-radius: 14px; padding: 14px; font-family: Consolas, Monaco, monospace; font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
    .switcher-bar { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .switcher-left { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .switcher-label { font-size: 14px; color: #475569; font-weight: 700; }
    select { min-width: 260px; padding: 11px 14px; border: 1px solid #d1d5db; border-radius: 12px; background: #fff; font-size: 14px; outline: none; }
    .case-header { padding: 18px 20px; border-bottom: 1px solid #eef2f7; background: #fcfdff; border-radius: 22px 22px 0 0; }
    .case-top { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .case-title { font-size: 21px; font-weight: 800; }
    .case-meta { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .meta-item { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px; }
    .meta-label { font-size: 12px; color: #6b7280; margin-bottom: 5px; }
    .meta-value { font-size: 14px; font-weight: 700; }
    .case-body { padding: 20px; display: grid; grid-template-columns: 0.95fr 1.45fr; gap: 18px; }
    .case-text-box, .results-box { border: 1px solid #e5e7eb; border-radius: 16px; padding: 16px; }
    .case-text-box { background: #fafafa; max-height: 900px; overflow: auto; }
    .results-box { background: #fbfdff; }
    .case-text-box h3, .results-box h3 { margin: 0 0 12px; font-size: 16px; }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.75; font-family: Consolas, Monaco, monospace; }
    .results-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .result-card { border: 1px solid #e5e7eb; border-radius: 16px; background: #fff; padding: 14px; }
    .result-card-title { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
    .result-card-title strong { font-size: 15px; }
    .risk-pill { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .risk-high { background: #fee2e2; color: #b91c1c; }
    .risk-moderate { background: #fef3c7; color: #b45309; }
    .risk-low { background: #dcfce7; color: #15803d; }
    .result-section { margin-bottom: 10px; }
    .result-section:last-child { margin-bottom: 0; }
    .result-section .label { font-size: 12px; color: #6b7280; margin-bottom: 5px; font-weight: 700; }
    .result-section .value { font-size: 13px; line-height: 1.7; color: #334155; }
    ul { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.75; color: #334155; }
    .kv-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .kv-item { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px; }
    .kv-key { font-size: 12px; color: #64748b; margin-bottom: 4px; word-break: break-word; }
    .kv-value { font-size: 13px; color: #1f2937; font-weight: 600; word-break: break-word; }
    .footer-note { padding: 16px; color: #475569; line-height: 1.7; border-style: dashed; }
    @media (max-width: 1300px) { .case-body { grid-template-columns: 1fr; } .results-grid { grid-template-columns: 1fr; } .kv-grid { grid-template-columns: 1fr; } }
    @media (max-width: 900px) { .summary-grid, .prompt-grid, .case-meta { grid-template-columns: 1fr; } }
  </style>
</head>

You are a research assistant for structured fall-risk assessment from discharge summaries in older adults.

Task:
Read the clinical note and produce a structured assessment of fall risk for research evaluation.

Important rules:
1. Use only information explicitly stated in the note.
2. Do not invent diagnoses, medications, investigations, appointments, follow-up plans, or events.
3. If a risk factor is missing or unclear, write "not stated" or "insufficient evidence".
4. Do not overstate certainty.
5. The explanation and recommended actions must be easy for a patient or family member to read.
6. Use short, clear, natural sentences.
7. Avoid medical jargon where possible. If a medical concept must be mentioned, explain it in simple words.
8. Recommended actions must remain general fall-prevention actions and must not introduce new patient-specific medical orders.
9. Do not mention information that is not clearly supported by the note.
10. Write the explanation and recommended actions directly to the patient using "you" and "your", not "the patient", "he", "she", or "they".
11. Use a calm, supportive, and respectful tone.

When explicitly documented, consider the following as important fall-risk indicators:
- recent fall
- recurrent falls
- gait, balance, or mobility impairment
- dizziness, syncope, fainting, or postural instability
- cognitive impairment, confusion, delirium, or poor safety awareness
- sedative, psychoactive, or other medications that may increase fall risk
- frailty, weakness, deconditioning, or reduced functional status
- walking aid use or need for mobility assistance
- functional or environmental safety concerns

Risk level definitions:
- High: recent or recurrent falls are documented, or multiple strong fall-risk indicators are documented, or serious mobility or safety concerns are documented
- Moderate: one or more fall-risk indicators are documented, but severe or multiple high-risk features are not clearly documented
- Low: little or no clear fall-risk evidence is documented

Writing requirements for the explanation:
- Write 1 to 3 short sentences.
- Explain the risk level in plain English.
- Directly connect the explanation to the documented evidence.
- Do not use a technical or academic tone.
- Do not mention uncertainty unless it is important.
- Make it sound clear and natural for a patient or family member.
- Use "you" and "your".

Writing requirements for recommended actions:
- Write 2 to 4 short, practical, patient-friendly actions.
- Focus on safe movement, awareness, support, and general fall prevention.
- Do not prescribe medications, tests, referrals, or treatment plans.
- Use action-oriented wording such as "Take your time when standing up" or "Use support when walking if needed."
- Make each action easy to understand and easy to follow.
- Write each action directly to the patient using "you" when natural.

    const promptEntries = Object.keys(PROMPTS).map(key => ({
      id: key,
      name: PROMPT_META[key]?.name || key,
      tag: PROMPT_META[key]?.tag || key.toUpperCase(),
      desc: PROMPT_META[key]?.desc || "",
      text: PROMPTS[key]
    }));

    function riskClass(level) {
      if (level === "High") return "risk-high";
      if (level === "Moderate") return "risk-moderate";
      return "risk-low";
    }

    function createList(items = []) {
      if (!items || items.length === 0) return "";
      return items.map(item => `<li>${item}</li>`).join("");
    }

    function createKeyValueGrid(obj = {}) {
      const entries = Object.entries(obj || {}).filter(([_, value]) => value !== undefined && value !== null && value !== "");
      if (entries.length === 0) return "";
      return `
        <div class="kv-grid">
          ${entries.map(([key, value]) => `
            <div class="kv-item">
              <div class="kv-key">${key}</div>
              <div class="kv-value">${value}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function createSection(title, content) {
      if (!content) return "";
      return `
        <div class="result-section">
          <div class="label">${title}</div>
          ${content}
        </div>
      `;
    }

    function createPromptCard(prompt) {
      return `
        <div class="prompt-card">
          <div class="prompt-head">
            <div class="prompt-name">${prompt.id.toUpperCase()} · ${prompt.name}</div>
            <span class="badge">${prompt.tag}</span>
          </div>
          <div class="prompt-meta">${prompt.desc}</div>
          <div class="prompt-text">${prompt.text}</div>
        </div>
      `;
    }

    function createResultCard(prompt, result = {}) {
      const evidenceHtml = result.evidence?.length ? `<ul>${createList(result.evidence)}</ul>` : "";
      const mainRiskFactorsHtml = result.main_risk_factors?.length ? `<ul>${createList(result.main_risk_factors)}</ul>` : "";
      const actionsHtml = result.recommended_actions?.length ? `<ul>${createList(result.recommended_actions)}</ul>` : "";
      const currentFallHtml = result.current_or_recent_fall_evidence?.length ? `<ul>${createList(result.current_or_recent_fall_evidence)}</ul>` : "";
      const historicalFallHtml = result.historical_fall_evidence?.length ? `<ul>${createList(result.historical_fall_evidence)}</ul>` : "";
      const otherRiskHtml = result.other_risk_factors?.length ? `<ul>${createList(result.other_risk_factors)}</ul>` : "";
      const riskFactorGrid = createKeyValueGrid(result.risk_factor_presence);

      return `
        <div class="result-card">
          <div class="result-card-title">
            <strong>${prompt.id.toUpperCase()}</strong>
            <span class="risk-pill ${riskClass(result.risk_level)}">${result.risk_level || ""}</span>
          </div>

          ${createSection("Explanation", result.explanation ? `<div class="value">${result.explanation}</div>` : "")}
          ${createSection("Evidence", evidenceHtml)}
          ${createSection("Risk Factor Presence", riskFactorGrid)}
          ${createSection("Main Risk Factors", mainRiskFactorsHtml)}
          ${createSection("Recommended Actions", actionsHtml)}
          ${createSection("Current or Recent Fall Evidence", currentFallHtml)}
          ${createSection("Historical Fall Evidence", historicalFallHtml)}
          ${createSection("Other Risk Factors", otherRiskHtml)}
          ${createSection("Uncertainty Note", result.uncertainty_note ? `<div class="value">${result.uncertainty_note}</div>` : "")}
        </div>
      `;
    }

    function renderPrompts() {
      document.getElementById("promptGrid").innerHTML = promptEntries.map(createPromptCard).join("");

    function renderCaseOptions() {
      const select = document.getElementById("caseSelect");
      select.innerHTML = cases.map(caseItem => `<option value="${caseItem.id}">${caseItem.title} · ${caseItem.label}</option>`).join("");
      if (cases.length > 0) select.value = cases[0].id;
    }

    function renderCurrentCase(caseId) {
      const caseItem = cases.find(item => item.id === caseId) || cases[0];
      const currentResults = results[caseItem.id] || {};
      document.getElementById("currentCaseStat").textContent = caseItem.title;

      const resultCards = promptEntries.map(prompt => createResultCard(prompt, currentResults[prompt.id] || {})).join("");

      document.getElementById("caseDisplay").innerHTML = `
        <div class="case-block">
          <div class="case-header">
            <div class="case-top">
              <div class="case-title">${caseItem.title}</div>
              <span class="badge">${caseItem.label}</span>
            </div>
            <div class="case-meta">
              
            </div>
          </div>

          <div class="case-body">
            <div class="case-text-box">
              <h3>病例文本</h3>
              <pre>${caseItem.text}</pre>
            </div>
            <div class="results-box">
              <h3>对应 Prompt 的结果</h3>
              <div class="results-grid">${resultCards}</div>
            </div>
          </div>
        </div>
      `;
    }

    function init() {
      renderPrompts();
      renderCaseOptions();
      if (cases.length > 0) renderCurrentCase(cases[0].id);
      document.getElementById("caseSelect").addEventListener("change", event => renderCurrentCase(event.target.value));
    }

    init();
  </script>
</body>
</html>
